<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to URL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-texture"></div>
  <div class="overlay"></div>

  <main class="page">
    <section class="card">
      <div class="top-badge">Luxury Upload Studio</div>

      <h1>Image to URL</h1>
      <p class="subtitle">Transform your image into a clean public URL in seconds.</p>

      <div class="upload-section">
        <label for="imageInput" class="file-btn">Choose Image</label>
        <input type="file" id="imageInput" accept="image/*" />

        <button class="upload-btn" onclick="uploadImage()">Generate URL</button>
      </div>

      <div id="preview" class="preview"></div>

      <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Processing your image...</p>
      </div>

      <section id="result" class="result hidden">
        <h2>Result</h2>
        <div id="output"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
