<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to URL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-web"></div>
  <div class="glow glow-left"></div>
  <div class="glow glow-right"></div>

  <main class="page">
    <section class="card">
      <div class="badge">Spider Web Uploader</div>
      <h1>Image to URL</h1>
      <p class="subtitle">Upload any image and get a direct public URL instantly.</p>

      <div class="controls">
        <label for="imageInput" class="file-btn">Choose Image</label>
        <input type="file" id="imageInput" accept="image/*" />
        <button class="upload-btn" onclick="uploadImage()">Upload Image</button>
      </div>

      <div id="preview" class="preview"></div>

      <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Sending through the web...</p>
      </div>

      <section id="result" class="result hidden">
        <h2>Result</h2>
        <div id="output"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
</html>
