<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to URL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-web"></div>

  <div class="container">
    <div class="card">
      <h1>Image to URL</h1>
      <p class="subtitle">Upload an image and get its direct URL instantly.</p>

      <label for="imageInput" class="custom-file-upload">
        Choose Image
      </label>
      <input type="file" id="imageInput" accept="image/*" />

      <button onclick="uploadImage()" class="upload-btn">Upload Image</button>

      <div id="preview" class="preview-box"></div>

      <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Uploading through the web...</p>
      </div>

      <div id="result" class="result-box hidden">
        <h2>Result</h2>
        <div id="output"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
